<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%9C%8E</text></svg>">
<title>marginalia</title>
<meta name="description" content="A blog written by hand on a reMarkable, published straight from the ink.">
<meta property="og:title" content="marginalia">
<meta property="og:description" content="A blog written by hand on a reMarkable, published straight from the ink.">
<meta property="og:type" content="article">
<meta property="og:image" content="https://amitsubhash.github.io/marginalia/images/hi-700f4c01/page_000.png">
<meta name="twitter:card" content="summary_large_image">
<style>
* { box-sizing: border-box; }
body {
    max-width: 1100px;
    margin: 3rem auto;
    padding: 0 1.5rem;
    font-family: Georgia, "Times New Roman", serif;
    color: #111;
    background: #fff;
    line-height: 1.5;
}
h1, h2 { font-weight: normal; }
h1 { font-style: italic; text-transform: lowercase; }
a { color: #111; text-decoration-color: #35c; text-decoration-thickness: 1.5px; text-underline-offset: 3px; }
a:hover { color: #35c; }
.site-title { text-align: center; margin: 1.5rem 0 3rem; }
.site-title a {
    font-style: italic;
    font-size: 1.6rem;
    letter-spacing: 0.02em;
    text-decoration: none;
    color: #111;
    display: inline-block;
}
/* Size the handwritten wordmark by height (a single word); clamp so it never
   becomes the biggest thing on a phone as the ink pages scale down. */
.wordmark {
    height: clamp(2.6rem, 7vw, 4rem);
    width: auto;
    display: block;
    margin: 0 auto;
}
.site-title a:hover .wordmark { opacity: 0.55; }
/* Dates are the only typeset text left; keep them quiet, like the printed
   page numbers in a real notebook rather than body copy. */
.post-date {
    color: #aaa;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-variant-numeric: tabular-nums;
}
.about-section { margin-bottom: 3rem; }
/* The handwriting sits directly on the page: the scanned paper is pure white,
   the page is pure white, and there is no border or shadow -- so the ink
   reads as part of the page itself rather than a photo of a separate sheet. */
.page-wrap {
    position: relative;
    margin: 0.5rem 0;
    width: 100%;
}
.page-image {
    width: 100%;
    height: auto;
    display: block;
}
.link-overlay {
    position: absolute;
    display: block;
    background-color: #35c;
    mix-blend-mode: screen;
    transition: opacity 0.12s;
}
.link-overlay:hover { opacity: 0.55; }
.link-overlay:focus-visible { outline: 2px solid #35c; outline-offset: 2px; }
h2.posts-heading {
    font-style: italic;
    font-weight: normal;
    color: #666;
    margin-top: 2rem;
}
ul.post-list { list-style: none; padding: 0; }
ul.post-list li {
    display: flex;
    gap: 1rem;
    align-items: baseline;
    margin-bottom: 0.8rem;
}
ul.post-list .post-date { min-width: 7.5rem; }

/* Dark mode keeps the seamless blend by inverting the scanned pages: white
   paper becomes near-black (matching the page), black ink becomes light. */
@media (prefers-color-scheme: dark) {
    body { background: #000; color: #ddd; }
    a { color: #ddd; }
    a:hover { color: #7aa5f0; }
    .site-title a { color: #ddd; }
    .page-wrap, .wordmark { filter: invert(1) hue-rotate(180deg); }
    .post-date { color: #888; }
    h2.posts-heading { color: #999; }
}
</style>
</head>
<body>

<div class="about-section"><div class="page-wrap">
<img class="page-image" src="images/hi-700f4c01/page_000.png" alt="A handwritten personal introduction by Amit, a first-year Neuroengineering PhD student at Indiana University, featuring three social media icons (Github, LinkedIn, X) and an email contact address." width="1279" height="1574" loading="eager" decoding="async">

<a class="link-overlay" href="https://www.linkedin.com/in/amitsubhash/" title="LinkedIn" style="left:39.01%;top:72.94%;width:19.71%;height:5.40%"></a>
<a class="link-overlay" href="https://x.com/amit1subhash" title="X" style="left:81.31%;top:72.62%;width:5.63%;height:5.33%"></a>
</div></div>

</body>
</html>
